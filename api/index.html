<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory-Augmented Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1a2e; padding: 16px 24px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; color: #a78bfa; }
    header span { font-size: 12px; color: #6b7280; }
    .badge { background: #1e3a5f; color: #60a5fa; font-size: 11px; padding: 3px 8px; border-radius: 12px; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
    .msg.user { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.bot { background: #1e1e30; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2a4a; }
    .msg.bot .label { font-size: 11px; color: #a78bfa; margin-bottom: 6px; font-weight: 600; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .typing span { width: 8px; height: 8px; background: #a78bfa; border-radius: 50%; animation: bounce 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
    footer { background: #1a1a2e; padding: 16px 24px; border-top: 1px solid #2a2a4a; display: flex; gap: 10px; }
    #input { flex: 1; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
    #input:focus { border-color: #4f46e5; }
    button { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 12px 20px; cursor: pointer; font-size: 14px; }
    button:hover { background: #4338ca; }
    button:disabled { background: #374151; cursor: not-allowed; }
    .meta { font-size: 11px; color: #6b7280; margin-top: 6px; }
    #user-bar { display: flex; gap: 8px; padding: 10px 24px; background: #13131f; border-bottom: 1px solid #1e1e30; align-items: center; font-size: 12px; color: #6b7280; }
    #user-bar input { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 4px 10px; color: #e0e0e0; font-size: 12px; width: 140px; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 Memory-Augmented Chatbot</h1>
    <div style="flex:1"></div>
    <span class="badge">RAG</span>
    <span class="badge">Knowledge Graph</span>
    <span class="badge">LLaMA 3.3 70B</span>
  </header>

  <div id="user-bar">
    <label>User ID:</label>
    <input id="uid" value="gauri" placeholder="user id"/>
    <label style="margin-left:12px">Session:</label>
    <input id="sid" value="session1" placeholder="session id"/>
  </div>

  <div id="chat">
    <div class="msg bot">
      <div class="label">Assistant</div>
      Hi! I'm your ML/AI knowledge assistant. I use RAG, a knowledge graph, and memory to answer questions about machine learning and AI. Ask me anything!
    </div>
  </div>

  <footer>
    <input id="input" placeholder="Ask about ML, transformers, RAG, deep learning..." onkeydown="if(event.key==='Enter')send()"/>
    <button id="btn" onclick="send()">Send</button>
  </footer>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const btnEl = document.getElementById('btn');

    function addMsg(text, role) {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      if (role === 'bot') {
        d.innerHTML = `<div class="label">Assistant</div>${text.replace(/\n/g, '<br>')}`;
      } else {
        d.textContent = text;
      }
      chatEl.appendChild(d);
      chatEl.scrollTop = chatEl.scrollHeight;
      return d;
    }

    function addTyping() {
      const d = document.createElement('div');
      d.className = 'msg bot typing';
      d.id = 'typing';
      d.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(d);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function send() {
      const msg = inputEl.value.trim();
      if (!msg) return;
      inputEl.value = '';
      btnEl.disabled = true;

      addMsg(msg, 'user');
      addTyping();

      const uid = document.getElementById('uid').value || 'default';
      const sid = document.getElementById('sid').value || 'default';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({user_id: uid, session_id: sid, message: msg})
        });
        const data = await res.json();
        document.getElementById('typing')?.remove();
        addMsg(data.answer, 'bot');
      } catch (e) {
        document.getElementById('typing')?.remove();
        addMsg('Error connecting to server. Make sure the API is running.', 'bot');
      }
      btnEl.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
